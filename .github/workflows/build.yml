name: Build Android APK 📱

# 언제 이 파이프라인을 실행할 것인가?
on:
  push:
    branches:
      - main # main 브랜치에 코드가 푸시될 때마다 자동 실행
  workflow_dispatch: {} # 깃허브 웹에서 수동으로 실행하는 버튼도 남겨둡니다

jobs:
  buildForAndroid:
    name: Build for Android 🤖
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 저장소에서 최신 코드를 가져옵니다.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. GameCI를 이용해 유니티 안드로이드 빌드를 수행합니다.
      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          # 아까 금고(Secrets)에 넣어둔 열쇠들을 여기서 꺼내 씁니다!
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          buildName: VamSir_TestBuild # 완성될 APK 파일의 이름
          allowDirtyBuild: true

      # 3. 성공적으로 구워진 APK 파일을 우리가 다운로드할 수 있게 올려줍니다.
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/StandaloneAndroid